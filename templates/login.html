<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台登录 · 龙潭EcoWeaves</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    /* ============ 登录页专属 ============ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Serif SC', serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ============ SVG 山水背景（复用首页动画） ============ */
    .login-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .login-bg svg {
      width: 100%;
      max-width: 960px;
      height: auto;
      max-height: 100vh;
      opacity: 0.75;
    }

    /* ============ 顶部导航（融入系统） ============ */
    .login-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 16px 28px;
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .login-nav-brand {
      font-family: var(--font-cn, 'Noto Serif SC'), serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: 2px;
    }
    .login-nav-link {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .login-nav-link:hover { color: var(--creek); }

    /* ============ 登录卡片 ============ */
    .login-card {
      position: relative;
      z-index: 1;
      width: 440px;
      background: rgba(254, 251, 245, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(45,52,54,0.10), 0 2px 8px rgba(45,52,54,0.04);
      border: 1px solid var(--border-subtle);
      padding: 44px 40px 36px;
      animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)    scale(1);    }
    }

    /* ============ 标题区（首页艺术字风格） ============ */
    .login-label {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--creek);
      text-transform: uppercase;
      margin-bottom: 14px;
      font-weight: 500;
      text-align: center;
    }
    .login-title {
      font-family: var(--font-cn, 'Noto Serif SC'), serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
      letter-spacing: 3px;
      text-align: center;
      margin-bottom: 0;
    }
    .login-title span {
      color: var(--wall);
    }
    .login-subtitle {
      font-family: 'Dancing Script', cursive;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--creek);
      margin-top: 8px;
      margin-bottom: 8px;
      font-style: italic;
      opacity: 0.8;
      text-align: center;
    }

    /* ============ 默认账号提示 ============ */
    .login-hint {
      margin: 24px auto 20px;
      padding: 12px 16px;
      background: var(--creek-soft);
      border: 1px solid rgba(91,154,142,0.12);
      border-radius: 10px;
      text-align: center;
    }
    .login-hint-label {
      font-size: 0.65rem;
      letter-spacing: 2px;
      color: var(--creek);
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .login-hint-row {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .login-hint-row code {
      font-family: 'Inter', monospace;
      background: rgba(255,255,255,0.7);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.85rem;
      color: var(--wall);
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* ============ 表单 ============ */
    .login-form { display: flex; flex-direction: column; gap: 16px; }

    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
    }
    .form-group input {
      width: 100%;
      padding: 11px 15px;
      font-size: 0.93rem;
      font-family: inherit;
      color: var(--text-primary);
      background: var(--bg-base);
      border: 1.5px solid #E8E4DF;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input::placeholder { color: var(--text-muted); }
    .form-group input:focus {
      border-color: var(--creek);
      box-shadow: 0 0 0 3px var(--creek-soft);
    }

    .login-btn {
      margin-top: 4px;
      width: 100%;
      padding: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 1px;
      color: #fff;
      background: linear-gradient(135deg, var(--forest), var(--creek));
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .login-btn:hover  { opacity: 0.93; transform: translateY(-1px); }
    .login-btn:active { transform: translateY(0); }

    /* ============ 错误提示 ============ */
    .login-error {
      display: none;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: #C45B5A;
      background: #FDF2F2;
      border: 1px solid #F5D5D5;
      border-radius: 10px;
      text-align: center;
    }
    .login-error.show { display: block; animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-6px); }
      40%     { transform: translateX(5px); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(3px); }
    }

    /* ============ 底部链接 ============ */
    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.73rem;
      color: var(--text-muted);
    }
    .login-footer a {
      color: var(--creek);
      text-decoration: none;
      transition: color 0.2s;
    }
    .login-footer a:hover { color: var(--forest); }

    /* ============ 响应式 ============ */
    @media (max-width: 500px) {
      .login-card { width: 92vw; padding: 36px 24px 28px; }
      .login-title { font-size: 1.8rem; }
      .login-nav { padding: 12px 16px; gap: 16px; }
    }
  </style>
</head>
<body>

  <!-- 山水 SVG 背景（复用首页 Hero 插画） -->

      <line x1="220" y1="338" x2="225" y2="348" stroke="rgba(45,52,54,0.12)" stroke-width="1"/>
      <!-- 近景松树 -->
      <g class="svganim-pine-near-1">
        <line x1="410" y1="340" x2="410" y2="260" stroke="rgba(45,52,54,0.20)" stroke-width="2"/>
        <path d="M410 265 L395 280 L405 278 L392 295 L403 293 L388 310" stroke="rgba(74,124,89,0.22)" stroke-width="1" fill="none"/>
        <path d="M410 270 L425 285 L415 283 L428 298 L417 296 L430 312" stroke="rgba(74,124,89,0.20)" stroke-width="1" fill="none"/>
        <ellipse cx="410" cy="258" rx="12" ry="16" fill="rgba(74,124,89,0.10)"/>

        <line x1="445" y1="345" x2="445" y2="278" stroke="rgba(45,52,54,0.15)" stroke-width="1.5"/>

  </div>

  <!-- 顶部导航（融入系统） -->
  <nav class="login-nav">
    <a href="/" class="login-nav-brand">龙潭 · EcoWeaves</a>
    <a href="/" class="login-nav-link">首页</a>
    <a href="/heritage" class="login-nav-link">传统非遗</a>
    <a href="/music-innovation" class="login-nav-link">现代艺术</a>
  </nav>

  <!-- 登录卡片 -->
  <div class="login-card">
    <div class="login-label">ADMINISTRATOR ACCESS</div>
    <h1 class="login-title">
      龙潭<span>后台</span>
    </h1>
    <div class="login-subtitle">Longtan Village · Operations</div>

    <!-- 默认账号提示 -->
    <div class="login-hint">
      <div class="login-hint-label">演示账号</div>
      <div class="login-hint-row">
        账号：<code>ecoweaves</code><br>
        密码：<code>Longtan@2024</code>
      </div>
    </div>

    {% if error %}
    <div class="login-error show">{{ error }}</div>
    {% endif %}
    {% if not error %}
    <div class="login-error" id="login-error"></div>
    {% endif %}

    <form class="login-form" method="POST" action="/login">
      <div class="form-group">
        <label for="username">账号</label>
        <input type="text" id="username" name="username" placeholder="输入账号" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" placeholder="输入密码" required>
      </div>
      <button type="submit" class="login-btn">登&nbsp;&nbsp;录</button>
    </form>

    <div class="login-footer">
      屏南龙潭非遗数字化平台 · <a href="/">返回首页</a>
    </div>
  </div>

</body>
</html>
